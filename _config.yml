# Site settings
title: Underpromotion
email: skysea001010@gmail.com
url: https://chess-freak.github.io/underpromotion/
baseurl: /underpromotion
description: "개발자용 깃허브 블로그 테마"
keywords: "Game Programmer"
locale: ko_KR
meta_author: Lee Ji-Heon

# Google webmaster tools
google_verify:

# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
contact: static

# If you use disqus you need disqus shortname
# https://help.disqus.com/customer/portal/articles/466208
disqus_shortname: myshortname

# Color settings (hex-codes without the leading hash-tag)
color:
  primary: 6799fa # User Identity Color
  primary-rgb: "103, 153, 250"
  secondary: 1e293b # Slate 800
  secondary-dark: 0f172a # Slate 900

# Footer settings
footer:
  copyright: Chess Freak
  location: Location
  social: Social
  credits: Credits

# Credits content
credits: 'Developed by Chess Freak'

# Build settings
markdown: kramdown
permalink: /:categories/:title

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

collections:
  about:
    output: false
