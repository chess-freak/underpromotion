---
layout: default
---
<section>
    <div class="container">
      <ul class="text-center blog-tags-list">
        {% for tag in page.tags %}
        <li class="blog-tag">
          <a href="{{ '/search/' | relative_url }}?tag={{ tag | url_encode }}">{{ tag }}</a>
        </li>
        {% endfor %}
      </ul>
      <h1>{{ page.title }}</h1>
      <div class="portfolio-body">
        {{ page.content }}
      </div>
    </div>
    <div class="container text-center">
      <ul class="list-inline item-details">
        <li>
          <a href="{{ site.baseurl }}/#portfolio" class="btn-social btn-outline" title="Home">
            <i class="fa-solid fa-house"></i>
            Home
          </a>
        </li>
        {% for network in page.social %}
        <li>
          <a href="{{ network.url }}" class="btn-social btn-outline" title="{{ network.info }}" target="_blank">
            <i class="fa-brands fa-fw fa-{{ network.title }}"></i>
            {{ network.info }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </div>
</section>
